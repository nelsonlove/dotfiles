conventions:
  meta_category: true
  meta_id: true
  unsorted_id: true
  ids_files_only: false
  capture_category: '01'
  naming:
    separator: '-'
    case: sentence
    no_trailing_spaces: true
    no_special_chars: true
patterns:
  '*.00':
    purpose: meta
    ids_files_only: false
    description: "JDex (category meta) — agent workspace, config, templates"
  '*.01':
    purpose: inbox
    ids_files_only: false
    description: "Category inbox — items not yet filed to a specific ID"
  '*.02':
    purpose: task-management
    ids_files_only: false
    description: "Task & project management — proposals and planning docs"
  x0:
    purpose: area-meta
    description: "Area management — area-level reference and conventions"
ignore:
- .DS_Store
- .git
- __pycache__
- .Trash
- '*.pyc'
