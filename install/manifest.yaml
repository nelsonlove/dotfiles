# Manifest — repos to clone and symlinks to create on a fresh machine
#
# The bootstrap script reads this to set up the system.
# Repos are cloned to ~/repos/<name>/.
# Symlinks connect ~/.config/, JD tree, and ~/repos/.

repos:
  jd-cli:
    url: git@github.com:nelsonlove/johnnydecimal.py.git
    jd_link: "00-09 System/00 System/00.05 jd-cli"

  # Add more repos here as they get JD IDs:
  # my-project:
  #   url: git@github.com:nelsonlove/my-project.git
  #   jd_link: "60-69 Work/61 Projects/61.03 My Project/my-project"

home_symlinks:
  # Dotfiles that must live directly in $HOME. Source (in this repo) → target.
  # ~/.zshenv is read before ZDOTDIR is set, so it can't live under ~/.config/zsh.
  zsh/.zshenv: ~/.zshenv

config_symlinks:
  # Source (in this repo) → target (on the system)
  aerospace: ~/.config/aerospace
  alacritty: ~/.config/alacritty
  doom: ~/.config/doom        # Doom Emacs config
  gh: ~/.config/gh
  git: ~/.config/git
  jd: ~/.config/jd
  karabiner: ~/.config/karabiner
  micro: ~/.config/micro
  proselint: ~/.config/proselint
  tmux: ~/.config/tmux
  zsh: ~/.config/zsh

jd_symlinks:
  # Source (on the system) → target (in JD tree, relative to ~/Documents/)
  ~/repos/dotfiles: "00-09 System/04 Apps & config/04.11 Dotfiles"
