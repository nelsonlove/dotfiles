# Manifest — repos to clone and symlinks to create on a fresh machine
#
# The bootstrap script reads this to set up the system.
# Repos are cloned to ~/repos/<name>/.
# Symlinks connect ~/.config/, JD tree, and ~/repos/.

repos:
  jd-cli:
    url: git@github.com:nelsonlove/johnnydecimal.py.git
    jd_link: "00-09 System/07 Apps & config/07.40 JD tools/+REPO jd-cli"

  # Inventory of ~/repos as of 2026-07-11 (jd_link pending for most).
  agent-approvals:
    url: git@github.com:nelsonlove/agent-approvals.git
  claude-code-plugins:
    url: git@github.com:nelsonlove/claude-code-plugins.git
  jd-numbering:
    url: git@github.com:nelsonlove/jd-numbering.git
  nelson.love:
    url: git@github.com:nelsonlove/nelson.love.git
  obsidian-execute-code:
    url: git@github.com:nelsonlove/obsidian-execute-code.git
  obsidian-vault-mcp-plugin:
    url: git@github.com:nelsonlove/obsidian-vault-mcp-plugin.git
  ops:  # upstream (callumalpass), not a fork
    url: git@github.com:callumalpass/ops.git
  repoint-links:
    url: git@github.com:nelsonlove/repoint-links.git
  tasknotes-workflows:
    url: git@github.com:nelsonlove/tasknotes-workflows.git
  vault-skills:
    url: git@github.com:nelsonlove/vault-skills.git
  # pickle-ios — local-only, NO remote; push it somewhere before relying on this list
  # obsidian-perf — scratch/perf-work dir moved in from ~/Desktop; not a clone target

  # Add more repos here as they get JD IDs:
  # my-project:
  #   url: git@github.com:nelsonlove/my-project.git
  #   jd_link: "60-69 Work/61 Projects/61.03 My Project/my-project"

home_symlinks:
  # Dotfiles that must live directly in $HOME. Source (in this repo) → target.
  # ~/.zshenv is read before ZDOTDIR is set, so it can't live under ~/.config/zsh.
  zsh/.zshenv: ~/.zshenv
  # Claude Code user config (secrets stay in ~/.claude/settings.local.json)
  claude/settings.json: ~/.claude/settings.json
  claude/skills: ~/.claude/skills

config_symlinks:
  # Source (in this repo) → target (on the system)
  aerospace: ~/.config/aerospace
  alacritty: ~/.config/alacritty
  doom: ~/.config/doom        # Doom Emacs config
  gh: ~/.config/gh
  git: ~/.config/git
  jd: ~/.config/jd
  karabiner: ~/.config/karabiner
  micro: ~/.config/micro
  proselint: ~/.config/proselint
  tmux: ~/.config/tmux
  zsh: ~/.config/zsh

jd_symlinks:
  # Source (on the system) → target (in JD tree, relative to ~/Documents/)
  ~/repos/dotfiles: "00-09 System/07 Apps & config/07.11 Dotfiles/+REPO dotfiles"
