expanded_areas:
  '27':
    name: People
    scheme: sequential-5digit
    range:
    - 27000
    - 27999
  90-99:
    name: Projects
    scheme: sequential-5digit
    range:
    - 90000
    - 99999
external_locations:
  LaCie SSD: /Volumes/LaCie SSD
  Extreme SSD: /Volumes/Extreme SSD
jdex:
  backend: yaml
notes:
  enabled: true
  backend: apple-notes
  sync:
    enabled: true
    direction: bidirectional
  filter:
    exclude_zeros: true
  folders:
    style: area
