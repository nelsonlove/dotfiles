version: 1
id: my-script-gated-job
name: My Script Gated Job
status: active

triggers:
  - type: script
    schedule: "*/15 * * * *"
    command: ["@config/scripts/my-script-gated-job/should-run.sh"]
    timeout: 30s

run:
  cwd: /path/to/project
  command: ["@config/scripts/my-script-gated-job/run-job.sh"]
  timeout: 30m
